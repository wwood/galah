name: Test Galah
on: [push, pull_request]

jobs:
  miniconda:
    name: Miniconda ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
        matrix:
            os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: test
          environment-file: galah.yml
          auto-activate-base: false
          channels: conda-forge,defaults,bioconda
      - run: |
          conda info
          conda list
      - name: Run test
        run: |
            cargo test

  pixi_test_dependencies_locked:
    name: Pixi test_dependencies_locked ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Create dev environment
        run: |
          pixi install -e dev
          pixi run -e dev pixi info

      - name: Show environment info
        run: |
          pixi run -e dev pixi list

      - name: Run tests with Pixi
        run: |
          pixi run -e dev galah -h
          pixi run -e dev cargo test

  # Run after removing lock file so dependences are unlocked
  pixi_test_dependencies_optimistic:
    name: Pixi test_dependencies_optimistic ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Remove lock file
        run: |
          rm -fv pixi.lock

      - name: Create dev environment
        run: |
          pixi install -e dev
          pixi run -e dev pixi info

      - name: Show environment info
        run: |
          pixi run -e dev pixi list

      - name: Run tests with Pixi
        run: |
          pixi run -e dev galah -h
          pixi run -e dev cargo test
